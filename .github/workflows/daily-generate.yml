name: Daily Product Generation

on:
  schedule:
    # Runs every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Override niche (leave empty for random)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install .

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation

      - name: Run product generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          ETSY_SHOP_NAME: ${{ secrets.ETSY_SHOP_NAME }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.niche }}" ]; then
            ARGS="$ARGS --niche=${{ inputs.niche }}"
          fi
          python -m src.main $ARGS

      - name: Upload generated products
        uses: actions/upload-artifact@v4
        with:
          name: products-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Commit bulk CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the CSV and manifest files, not the full output
          WEEK_DIR=$(find output -maxdepth 1 -type d -name "week-*" | sort | tail -1)
          if [ -n "$WEEK_DIR" ] && [ -f "$WEEK_DIR/etsy_bulk_upload.csv" ]; then
            git add "$WEEK_DIR/etsy_bulk_upload.csv"
            git add "$WEEK_DIR/*/manifest.json" 2>/dev/null || true
            git commit -m "🛍️ New products generated $(date +%Y-%m-%d)" || echo "No changes to commit"
            git push
          fi
