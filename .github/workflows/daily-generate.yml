name: Daily Product Generation

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs every day at 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Override niche (leave empty for random)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install .

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation

      - name: Run product generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          ETSY_SHOP_NAME: ${{ secrets.ETSY_SHOP_NAME }}
        run: |
          ARGS=""

          # workflow_dispatch input is empty on scheduled runs; default to false
          DRY_RUN_INPUT="${{ github.event.inputs.dry_run || 'false' }}"
          NICHE_INPUT="${{ github.event.inputs.niche || '' }}"

          if [ "$DRY_RUN_INPUT" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Avoid hard failures when OpenAI key is not configured yet
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing, switching to --dry-run"
            case " $ARGS " in
              *" --dry-run "*) ;;
              *) ARGS="$ARGS --dry-run" ;;
            esac
          fi

          if [ -n "$NICHE_INPUT" ]; then
            ARGS="$ARGS --niche=$NICHE_INPUT"
          fi

          python -m src.main $ARGS

      - name: Upload generated products
        uses: actions/upload-artifact@v5
        with:
          name: products-${{ github.run_number }}
          path: output/
          retention-days: 30
